<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet", href = "style.css">
</head>
<body>
    <header>
        <h2>
            Calculator
        </h2>
    </header>
    <main> 
        <div id = "Calculator">
            <div id = "bombT"></div>
            <div id = "Question">
                <p id = "Qtext">Question</p>
            </div>
            <div id = "row1">
                <button data-button = "7">7</button>
                <button data-button = "8">8</button>
                <button data-button = "9">9</button>
                <button data-button = "+">+</button>
            </div>
            <div id = "row2">
                <button data-button = "4">4</button>
                <button data-button = "5">5</button>
                <button data-button = "6">6</button>
                <button data-button = "-">-</button>
            </div>
            <div id = "row3">
                <button data-button = "1">1</button>
                <button data-button = "2">2</button>
                <button data-button = "3">3</button>
                <button data-button = "*">&times;</button>
            </div>
            <div id = "row4">
                <button data-button = ".">.</button>
                <button data-button = "0">0</button>
                <button data-button = "delete">⌫</button>
                <button data-button = "\">&divide;</button>
            </div>
            <div id = "row5">
                <button data-button = "AC">AC</button>
                <button data-button = "equal" id = "equals">=</button>
                <button data-button = "random">&#127922;</button>
                <button data-button = "square">()<sup>2</sup></button>
            </div>
            <div id = "Answer">
                <span id = "Atext">Answer</span>
            </div>
        </div>
    </main>
    <footer>
        <script src = "script.js"></script>
    </footer>
</body>
</html>
